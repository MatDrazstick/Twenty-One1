<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twenty-One</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f1110;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #gameCanvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            cursor: crosshair;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        #game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 10;
            gap: 24px;
            padding: 40px 20px;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            letter-spacing: 0.15em;
            color: #e0e0e0;
            text-shadow: 0 0 30px rgba(0,200,0,0.35);
            margin-bottom: 8px;
        }
        h2 { font-size: 1.4rem; color: #aaa; margin-bottom: 4px; }
        .subtitle {
            font-size: 0.9rem;
            color: #555;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .menu-btn {
            width: 260px;
            padding: 16px 0;
            background: transparent;
            border: 2px solid #3a5a3e;
            color: #ddd;
            font-family: inherit;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .menu-btn:hover {
            background: rgba(0,200,0,0.08);
            border-color: #0f0;
            color: #fff;
        }
        .menu-btn.secondary {
            border-color: #2a3a2e;
            color: #666;
            font-size: 0.85rem;
        }
        .menu-btn.secondary:hover { border-color: #aaa; color: #bbb; }

        .settings-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 320px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input[type="text"],
        select {
            background: #111;
            border: 1px solid #3a5a3e;
            color: #eee;
            font-family: inherit;
            font-size: 0.95rem;
            padding: 9px 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus,
        select:focus { border-color: #0f0; }

        select option { background: #111; }

        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
        }

        .divider {
            width: 200px;
            height: 1px;
            background: linear-gradient(to right, transparent, #3a5a3e, transparent);
        }
    </style>
</head>
<body>

    <div id="main-menu" class="screen">
        <h1>TWENTY-ONE</h1>
        <p class="subtitle">A card game of skill and machine</p>
        <div class="divider"></div>
        <button id="btn-singleplayer" class="menu-btn">Singleplayer</button>
        <button id="btn-multiplayer"  class="menu-btn">Online Multiplayer</button>
        <div class="divider"></div>
    </div>

    <div id="settings-screen" class="screen" style="display:none">
        <h2 id="settings-title">Game Settings</h2>
        <div class="divider"></div>

        <div class="settings-grid">
            <div class="form-row">
                <label for="player-name">Your Name</label>
                <input type="text" id="player-name" placeholder="Player 1" maxlength="20">
            </div>

            <div class="form-row">
                <label for="timer-select">Turn Timer</label>
                <select id="timer-select">
                    <option value="15">15 seconds</option>
                    <option value="30" selected>30 seconds</option>
                    <option value="45">45 seconds</option>
                    <option value="60">60 seconds</option>
                    <option value="75">75 seconds</option>
                    <option value="90">90 seconds</option>
                </select>
            </div>

            <div class="form-row">
                <label for="move-mode-select">Move Distance Mode</label>
                <select id="move-mode-select">
                    <option value="rise"    selected>Rise (increases each round)</option>
                    <option value="shuffle">Shuffle (random each round)</option>
                </select>
            </div>

            <div class="form-row">
                <label for="first-player-select">First Player</label>
                <select id="first-player-select">
                    <option value="player1" selected>Player 1</option>
                    <option value="player2">Player 2</option>
                    <option value="random">Random</option>
                </select>
            </div>
        </div>

        <div class="btn-row">
            <button id="btn-back"       class="menu-btn secondary">Back</button>
            <button id="btn-start-game" class="menu-btn">Start Game</button>
        </div>
    </div>

    <div id="game-screen">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module" src="src/Main.js"></script>
</body>
</html>
